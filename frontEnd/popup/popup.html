<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeciesScan</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    #app {
      position: relative;
    }

    #logo {
      position: absolute;
      top: 0;
      right: 0;
      width: 48px;
      height: 48px;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <div id="app">

    <img id="logo" src="logo.webp" alt="SpeciesScan Logo">

    <h1>SpeciesScan</h1>

    <div id="capture-zone">
      <p id="placeholder">No region captured yet</p>
      <img id="preview-img" src="" alt="Captured region">
      <button id="captureBtn">Select Region</button>
      <button id="analyzeBtn">Analyze</button>
    </div>

  </div>

  <div id="results"></div>

  <script type="module" src="popup.js"></script>

</body>
</html>
